name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Validate canonical data
        run: uv run python scripts/validate_data.py --csv data/canonical/rdu_timeline_data.csv

      - name: Run tests
        run: uv run pytest
